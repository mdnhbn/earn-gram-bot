
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnGram Secure Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .blur-overlay {
            display: none;
            backdrop-filter: blur(12px);
            background: rgba(0, 0, 0, 0.8);
        }
        .blur-overlay.active {
            display: flex;
        }
    </style>
</head>
<body>
    <div id="app" class="relative h-full flex flex-col">
        <!-- Focus Warning Overlay -->
        <div id="warning-overlay" class="blur-overlay fixed inset-0 z-[100] flex-col items-center justify-center text-center p-6">
            <div class="bg-slate-900 p-8 rounded-3xl border-2 border-red-500 shadow-2xl max-w-xs">
                <div class="text-5xl mb-4">⚠️</div>
                <h1 class="text-xl font-black uppercase mb-2">STRIKE ALERT</h1>
                <p class="text-slate-400 text-sm mb-6">Timer paused! Return to the app to continue earning.</p>
                <div class="animate-pulse text-blue-400 font-bold">Waiting for focus...</div>
            </div>
        </div>

        <!-- Video Player Section -->
        <div class="flex-1 bg-black relative overflow-hidden" id="player-container">
            <!-- Loading Spinner -->
            <div id="loading-spinner" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-50">
                <div class="loader mb-4"></div>
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400 animate-pulse">Loading Secure Content...</p>
            </div>

            <!-- Fallback Button (Hidden by default) -->
            <div id="fallback-zone" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-slate-950 z-40 p-6 text-center">
                <div class="text-4xl mb-4">📺</div>
                <h3 class="text-lg font-bold mb-4">Video not loading?</h3>
                <a id="external-link" href="#" target="_blank" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl font-black uppercase tracking-widest text-xs shadow-lg transition-all active:scale-95">
                    Click here to watch
                </a>
                <p class="mt-4 text-[10px] text-slate-500 uppercase font-bold">Return here after watching to claim reward</p>
            </div>

            <!-- Iframe Slot -->
            <div id="iframe-slot" class="w-full h-full"></div>
        </div>

        <!-- Control Bar -->
        <div class="bg-[#0b141a] border-t border-white/5 p-4 flex flex-col items-center gap-4">
            <div id="timer-box" class="flex items-center gap-3 bg-white/5 px-6 py-2 rounded-2xl border border-white/10">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Time Left</span>
                <span id="timer-display" class="text-xl font-black text-blue-400 font-mono">00:00</span>
            </div>

            <!-- Captcha Section -->
            <div id="captcha-box" class="hidden w-full max-w-xs animate-in slide-in-from-bottom duration-500">
                <div class="bg-blue-600/10 border border-blue-500/30 p-4 rounded-2xl text-center space-y-3">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Solve to Claim Reward</p>
                    <div class="flex items-center justify-center gap-3">
                        <span id="math-problem" class="text-xl font-black">? + ? = ?</span>
                        <input type="number" id="captcha-input" class="w-20 bg-black border border-white/10 rounded-xl px-2 py-2 text-center font-black text-xl focus:border-blue-500 outline-none" placeholder="?">
                    </div>
                    <button id="claim-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-black uppercase tracking-widest text-xs transition-all shadow-lg shadow-blue-600/20">
                        Claim Reward
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');
        let timeLeft = parseInt(urlParams.get('time')) || 30;
        
        const timerDisplay = document.getElementById('timer-display');
        const warningOverlay = document.getElementById('warning-overlay');
        const iframeSlot = document.getElementById('iframe-slot');
        const captchaBox = document.getElementById('captcha-box');
        const timerBox = document.getElementById('timer-box');
        const mathProblem = document.getElementById('math-problem');
        const captchaInput = document.getElementById('captcha-input');
        const claimBtn = document.getElementById('claim-btn');
        const fallbackZone = document.getElementById('fallback-zone');
        const externalLink = document.getElementById('external-link');
        const loadingSpinner = document.getElementById('loading-spinner');

        let isPaused = false;
        let captchaAnswer = 0;
        let loadTimeout;

        function parseVideoUrl(url) {
            if (!url) return null;

            // YouTube
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = url.match(regExp);
                const id = (match && match[2].length === 11) ? match[2] : null;
                if (id) return `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&showinfo=0&mute=0`;
            }

            // Dailymotion
            if (url.includes('dailymotion.com') || url.includes('dai.ly')) {
                let id = null;
                if (url.includes('dai.ly')) {
                    id = url.split('/').pop().split('?')[0];
                } else {
                    id = url.split('/video/')[1]?.split('?')[0];
                }
                if (id) return `https://www.dailymotion.com/embed/video/${id}?autoplay=1&mute=1&ui-logo=false`;
            }

            // Vimeo
            if (url.includes('vimeo.com')) {
                const id = url.split('/').pop().split('?')[0];
                if (id) return `https://player.vimeo.com/video/${id}?autoplay=1`;
            }

            return url; // Return original if no specific parser matches
        }

        function initPlayer() {
            if (!videoUrl) {
                loadingSpinner.innerHTML = '<p class="text-red-500 font-bold">INVALID VIDEO URL</p>';
                return;
            }

            const embedUrl = parseVideoUrl(videoUrl);
            externalLink.href = videoUrl;

            // Set a 10s timeout for fallback
            loadTimeout = setTimeout(() => {
                fallbackZone.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
            }, 10000);

            const iframe = document.createElement('iframe');
            iframe.src = embedUrl;
            iframe.className = "w-full h-full border-none";
            iframe.allow = "autoplay; encrypted-media; gyroscope; picture-in-picture; fullscreen";
            
            iframe.onload = () => {
                clearTimeout(loadTimeout);
                loadingSpinner.classList.add('hidden');
                fallbackZone.classList.add('hidden');
            };

            iframeSlot.appendChild(iframe);
        }

        // Timer Logic
        const countdown = setInterval(() => {
            if (!isPaused && timeLeft > 0) {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (timeLeft === 0) {
                    clearInterval(countdown);
                    showCaptcha();
                }
            }
        }, 1000);

        // Focus Monitoring
        window.onblur = () => {
            isPaused = true;
            warningOverlay.classList.add('active');
            window.parent.postMessage({ type: 'FOCUS_LOST' }, '*');
        };

        window.onfocus = () => {
            isPaused = false;
            warningOverlay.classList.remove('active');
            window.parent.postMessage({ type: 'FOCUS_GAINED' }, '*');
        };

        // Captcha
        function showCaptcha() {
            timerBox.classList.add('hidden');
            captchaBox.classList.remove('hidden');
            
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            captchaAnswer = num1 + num2;
            mathProblem.innerText = `${num1} + ${num2} = ?`;
            
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            }
        }

        claimBtn.onclick = () => {
            const userVal = parseInt(captchaInput.value);
            if (userVal === captchaAnswer) {
                claimBtn.disabled = true;
                claimBtn.innerText = 'Claiming...';
                window.parent.postMessage({ type: 'CLAIM_TASK' }, '*');
            } else {
                alert('Wrong answer! Try again.');
                showCaptcha();
                captchaInput.value = '';
            }
        };

        initPlayer();
    </script>
</body>
</html>
