
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EarnGram Universal Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ffffff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .blur-overlay {
            display: none;
            backdrop-filter: blur(15px);
            background: rgba(0, 0, 0, 0.85);
        }
        .blur-overlay.active {
            display: flex;
        }
        #media-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        iframe, video {
            width: 100% !important;
            height: 100% !important;
            border: none;
        }
    </style>
</head>
<body>
    <div id="app" class="relative h-full flex flex-col">
        <!-- Focus Warning Overlay -->
        <div id="warning-overlay" class="blur-overlay fixed inset-0 z-[100] flex-col items-center justify-center text-center p-6">
            <div class="bg-slate-900 p-8 rounded-3xl border-2 border-red-500 shadow-2xl max-w-xs">
                <div class="text-5xl mb-4">⚠️</div>
                <h1 class="text-xl font-black uppercase mb-2">STRIKE ALERT</h1>
                <p class="text-slate-400 text-sm mb-6">Timer paused! Return to the app to continue earning.</p>
                <div class="animate-pulse text-white font-bold">Waiting for focus...</div>
            </div>
        </div>

        <!-- Video Player Section -->
        <div class="flex-1 bg-black relative overflow-hidden" id="player-container">
            <!-- Loading Spinner Overlay -->
            <div id="loading-spinner" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-50">
                <div class="loader mb-6"></div>
                <p class="text-sm font-black uppercase tracking-[0.3em] text-white animate-pulse">🔄 Synchronizing Content...</p>
            </div>

            <!-- Fallback Button -->
            <div id="fallback-zone" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-slate-950 z-40 p-6 text-center">
                <div class="text-5xl mb-6">📺</div>
                <h3 class="text-xl font-bold mb-6">Content Sync Failed?</h3>
                <a id="external-link" href="#" target="_blank" class="bg-white text-black px-10 py-4 rounded-2xl font-black uppercase tracking-widest text-sm shadow-2xl transition-all active:scale-95">
                    Play Externally
                </a>
                <p class="mt-6 text-[10px] text-slate-500 uppercase font-bold tracking-widest">Return here after watching to claim reward</p>
            </div>

            <!-- Media Container -->
            <div id="media-container"></div>
        </div>

        <!-- Control Bar -->
        <div class="bg-[#0b141a] border-t border-white/5 p-5 flex flex-col items-center gap-5">
            <div id="timer-box" class="flex items-center gap-4 bg-white/5 px-8 py-3 rounded-2xl border border-white/10">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Syncing Progress</span>
                <span id="timer-display" class="text-2xl font-black text-white font-mono">00:00</span>
            </div>

            <!-- Captcha Section -->
            <div id="captcha-box" class="hidden w-full max-w-xs animate-in slide-in-from-bottom duration-500">
                <div class="bg-white/5 border border-white/10 p-6 rounded-3xl text-center space-y-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Human Verification</p>
                    <div class="flex items-center justify-center gap-4">
                        <span id="math-problem" class="text-2xl font-black text-white">? + ? = ?</span>
                        <input type="number" id="captcha-input" class="w-24 bg-black border border-white/20 rounded-2xl px-3 py-3 text-center font-black text-2xl text-white focus:border-white outline-none transition-all" placeholder="?">
                    </div>
                    <button id="claim-btn" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase tracking-widest text-xs transition-all shadow-xl active:scale-95">
                        Claim Reward
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('url');
        const userId = urlParams.get('user_id');
        let timeLeft = parseInt(urlParams.get('time')) || 30;
        
        const timerDisplay = document.getElementById('timer-display');
        const warningOverlay = document.getElementById('warning-overlay');
        const mediaContainer = document.getElementById('media-container');
        const captchaBox = document.getElementById('captcha-box');
        const timerBox = document.getElementById('timer-box');
        const mathProblem = document.getElementById('math-problem');
        const captchaInput = document.getElementById('captcha-input');
        const claimBtn = document.getElementById('claim-btn');
        const fallbackZone = document.getElementById('fallback-zone');
        const externalLink = document.getElementById('external-link');
        const loadingSpinner = document.getElementById('loading-spinner');

        let isPaused = false;
        let captchaAnswer = 0;
        let loadTimeout;

        function getEmbedInfo(url) {
            if (!url) return null;

            // YouTube
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = url.match(regExp);
                const id = (match && match[2].length === 11) ? match[2] : null;
                if (id) return {
                    type: 'iframe',
                    src: `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1&origin=https://earn-gram-bot.onrender.com`
                };
            }

            // Dailymotion
            if (url.includes('dailymotion.com') || url.includes('dai.ly')) {
                let id = null;
                if (url.includes('dai.ly')) {
                    id = url.split('/').pop().split('?')[0];
                } else {
                    id = url.split('/video/')[1]?.split('?')[0];
                }
                if (id) return {
                    type: 'iframe',
                    src: `https://www.dailymotion.com/embed/video/${id}?autoplay=1&mute=1&ui-logo=false&api=postMessage`
                };
            }

            // TikTok
            if (url.includes('tiktok.com')) {
                const match = url.match(/\/video\/(\d+)/);
                const id = match ? match[1] : null;
                if (id) return {
                    type: 'iframe',
                    src: `https://www.tiktok.com/embed/v2/${id}`
                };
            }

            // Facebook
            if (url.includes('facebook.com')) {
                return {
                    type: 'iframe',
                    src: `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=0&autoplay=1`
                };
            }

            // Direct MP4 or similar
            if (url.match(/\.(mp4|webm|ogg|mov)$/) || url.includes('storage')) {
                return {
                    type: 'video',
                    src: url
                };
            }

            return { type: 'iframe', src: url };
        }

        function initPlayer() {
            if (!videoUrl || videoUrl === '#') {
                loadingSpinner.innerHTML = '<p class="text-red-500 font-bold">MISSING CONTENT SOURCE</p>';
                return;
            }

            const info = getEmbedInfo(videoUrl);
            externalLink.href = videoUrl;

            // 8s timeout for fallback
            loadTimeout = setTimeout(() => {
                fallbackZone.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
            }, 8000);

            if (info.type === 'iframe') {
                const iframe = document.createElement('iframe');
                iframe.src = info.src;
                iframe.allow = "autoplay; encrypted-media; fullscreen; picture-in-picture; gyroscope; accelerometer";
                iframe.sandbox = "allow-forms allow-scripts allow-same-origin allow-presentation";
                
                iframe.onload = () => {
                    clearTimeout(loadTimeout);
                    loadingSpinner.classList.add('hidden');
                    fallbackZone.classList.add('hidden');
                };

                mediaContainer.appendChild(iframe);
            } else if (info.type === 'video') {
                const video = document.createElement('video');
                video.src = info.src;
                video.autoplay = true;
                video.controls = true;
                video.playsInline = true;
                video.onloadeddata = () => {
                    clearTimeout(loadTimeout);
                    loadingSpinner.classList.add('hidden');
                    fallbackZone.classList.add('hidden');
                };
                mediaContainer.appendChild(video);
            }
        }

        // Timer Logic
        const countdown = setInterval(() => {
            if (!isPaused && timeLeft > 0) {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (timeLeft === 0) {
                    clearInterval(countdown);
                    showCaptcha();
                }
            }
        }, 1000);

        // Focus Monitoring
        window.onblur = () => {
            isPaused = true;
            warningOverlay.classList.add('active');
            window.parent.postMessage({ type: 'FOCUS_LOST' }, '*');
        };

        window.onfocus = () => {
            isPaused = false;
            warningOverlay.classList.remove('active');
            window.parent.postMessage({ type: 'FOCUS_GAINED' }, '*');
        };

        // Captcha
        function showCaptcha() {
            timerBox.classList.add('hidden');
            captchaBox.classList.remove('hidden');
            
            const num1 = Math.floor(Math.random() * 12) + 1;
            const num2 = Math.floor(Math.random() * 12) + 1;
            captchaAnswer = num1 + num2;
            mathProblem.innerText = `${num1} + ${num2} = ?`;
            
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            }
        }

        claimBtn.onclick = () => {
            const userVal = parseInt(captchaInput.value);
            if (userVal === captchaAnswer) {
                claimBtn.disabled = true;
                claimBtn.innerText = 'Verifying...';
                window.parent.postMessage({ type: 'CLAIM_TASK', user_id: userId, status: 'success' }, '*');
            } else {
                alert('Verification failed. Try again.');
                showCaptcha();
                captchaInput.value = '';
            }
        };

        initPlayer();
    </script>
</body>
</html>
